name: Update bucket
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  excavate:
    name: Excavator
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Excavator
      uses: ScoopInstaller/Scoop-GithubActions@e174c3bef2aeec16a40f2f075cafa167733f0a3e
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USER_EMAIL: ${{ secrets.EMAIL }}
